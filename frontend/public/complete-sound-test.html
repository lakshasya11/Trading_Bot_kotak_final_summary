<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔊 Sound System Test - Direct Test</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.3/howler.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #1e1e1e;
            color: #fff;
        }
        h1 { color: #4CAF50; }
        .status {
            padding: 15px;
            margin: 10px 0;
            border-radius: 5px;
            font-weight: bold;
        }
        .success { background: #2d5016; border: 2px solid #4CAF50; }
        .error { background: #5d1616; border: 2px solid #f44336; }
        .info { background: #16355d; border: 2px solid #2196F3; }
        button {
            padding: 15px 30px;
            margin: 10px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            background: #4CAF50;
            color: white;
            font-weight: bold;
        }
        button:hover { background: #45a049; }
        button:disabled { background: #666; cursor: not-allowed; }
        #log {
            background: #000;
            padding: 15px;
            border-radius: 5px;
            font-family: monospace;
            height: 300px;
            overflow-y: auto;
            margin-top: 20px;
        }
        .log-entry { margin: 5px 0; }
        .log-success { color: #4CAF50; }
        .log-error { color: #f44336; }
        .log-info { color: #2196F3; }
        .log-sound { color: #FFC107; }
    </style>
</head>
<body>
    <h1>🔊 Trading Bot Sound System Test</h1>
    
    <div id="status" class="status info">
        Click "Initialize Audio" to start
    </div>

    <div>
        <button id="initBtn" onclick="initAudio()">1️⃣ Initialize Audio</button>
        <button id="testEntry" onclick="playSound('entry')" disabled>🟢 Test Entry Sound</button>
        <button id="testProfit" onclick="playSound('profit')" disabled>💰 Test Profit Sound</button>
        <button id="testLoss" onclick="playSound('loss')" disabled>🔴 Test Loss Sound</button>
        <button id="testWarning" onclick="playSound('warning')" disabled>⚠️ Test Warning Sound</button>
    </div>

    <div>
        <button onclick="testWebSocket()" disabled id="wsBtn">2️⃣ Test WebSocket Sounds</button>
        <button onclick="testAll()" disabled id="allBtn">3️⃣ Test All Sounds</button>
    </div>

    <div id="log"></div>

    <script>
        let sounds = {};
        let ws = null;
        let audioInitialized = false;

        function log(message, type = 'info') {
            const logDiv = document.getElementById('log');
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        function updateStatus(message, isSuccess) {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = isSuccess ? 'status success' : 'status error';
        }

        function initAudio() {
            log('🎵 Initializing sound system...', 'info');
            
            try {
                // Initialize Howler sounds
                sounds = {
                    entry: new Howl({
                        src: ['/sound/entry.mp3'],
                        volume: 0.7,
                        onload: () => log('✅ Entry sound loaded', 'success'),
                        onloaderror: (id, err) => log(`❌ Entry sound failed: ${err}`, 'error')
                    }),
                    profit: new Howl({
                        src: ['/sound/profit.mp3'],
                        volume: 0.7,
                        onload: () => log('✅ Profit sound loaded', 'success'),
                        onloaderror: (id, err) => log(`❌ Profit sound failed: ${err}`, 'error')
                    }),
                    loss: new Howl({
                        src: ['/sound/loss.mp3'],
                        volume: 0.7,
                        onload: () => log('✅ Loss sound loaded', 'success'),
                        onloaderror: (id, err) => log(`❌ Loss sound failed: ${err}`, 'error')
                    }),
                    warning: new Howl({
                        src: ['/sound/warning.mp3'],
                        volume: 1.0,
                        onload: () => log('✅ Warning sound loaded', 'success'),
                        onloaderror: (id, err) => log(`❌ Warning sound failed: ${err}`, 'error')
                    })
                };

                // Silent unlock
                log('🔓 Performing silent audio unlock...', 'info');
                Object.values(sounds).forEach(sound => {
                    const originalVolume = sound.volume();
                    sound.volume(0);
                    sound.play();
                    sound.stop();
                    sound.volume(originalVolume);
                });

                audioInitialized = true;
                updateStatus('✅ Audio system initialized! You can now test sounds.', true);
                log('✅ Audio unlocked silently', 'success');

                // Enable buttons
                document.getElementById('testEntry').disabled = false;
                document.getElementById('testProfit').disabled = false;
                document.getElementById('testLoss').disabled = false;
                document.getElementById('testWarning').disabled = false;
                document.getElementById('wsBtn').disabled = false;
                document.getElementById('allBtn').disabled = false;
                document.getElementById('initBtn').disabled = true;

            } catch (error) {
                updateStatus(`❌ Failed to initialize audio: ${error.message}`, false);
                log(`❌ Initialization error: ${error}`, 'error');
            }
        }

        function playSound(type) {
            if (!audioInitialized) {
                log('❌ Audio not initialized yet!', 'error');
                return;
            }

            log(`🔊 Playing ${type} sound...`, 'sound');
            
            if (sounds[type]) {
                sounds[type].play()
                    .then(() => log(`✅ ${type} sound played successfully`, 'success'))
                    .catch(err => log(`❌ ${type} sound failed: ${err}`, 'error'));
            } else {
                log(`❌ Sound "${type}" not found!`, 'error');
            }
        }

        function testWebSocket() {
            log('📡 Connecting to WebSocket...', 'info');
            
            try {
                ws = new WebSocket('ws://localhost:8000/ws');
                
                ws.onopen = () => {
                    log('✅ WebSocket connected', 'success');
                    updateStatus('✅ WebSocket connected - listening for sounds...', true);
                };

                ws.onmessage = (event) => {
                    try {
                        const data = JSON.parse(event.data);
                        
                        if (data.type === 'play_sound') {
                            log(`🔊 WebSocket sound received: ${data.payload}`, 'sound');
                            playSound(data.payload);
                        } else {
                            log(`📨 Received: ${data.type}`, 'info');
                        }
                    } catch (err) {
                        log(`❌ Message parse error: ${err}`, 'error');
                    }
                };

                ws.onerror = (error) => {
                    log(`❌ WebSocket error: ${error}`, 'error');
                    updateStatus('❌ WebSocket connection failed', false);
                };

                ws.onclose = () => {
                    log('🔌 WebSocket disconnected', 'info');
                };

            } catch (error) {
                log(`❌ WebSocket connection failed: ${error}`, 'error');
                updateStatus('❌ Cannot connect to WebSocket', false);
            }
        }

        async function testAll() {
            log('🎯 Testing all sounds in sequence...', 'info');
            const soundTypes = ['entry', 'profit', 'loss', 'warning'];
            
            for (const type of soundTypes) {
                playSound(type);
                await new Promise(resolve => setTimeout(resolve, 1500));
            }
            
            log('✅ All sounds tested!', 'success');
        }

        // Auto-test on load
        window.onload = () => {
            log('🚀 Sound test page loaded', 'info');
            log('Click "Initialize Audio" to unlock browser audio', 'info');
        };
    </script>
</body>
</html>
